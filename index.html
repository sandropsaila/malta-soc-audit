<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Required</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0b0e14; --surface: #111622; --border: rgba(255,255,255,0.07); --accent: #4f8ef7; --text: #e8edf7; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image: linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);
      background-size:48px 48px; pointer-events:none;
    }
    body::after {
      content:''; position:fixed; width:500px; height:500px;
      background:radial-gradient(circle,rgba(79,142,247,0.12) 0%,transparent 70%);
      top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:0;
    }
    .shell {
      position:relative; z-index:1; background:var(--surface);
      border:1px solid var(--border); border-radius:28px;
      padding:40px 36px 36px; width:320px;
      box-shadow:0 32px 80px rgba(0,0,0,0.5);
    }
    .lock-icon {
      width:48px; height:48px; border:2px solid rgba(79,142,247,0.4);
      border-radius:14px; display:flex; align-items:center; justify-content:center;
      margin:0 auto 24px; background:rgba(79,142,247,0.08);
      transition:border-color .3s,background .3s;
    }
    .lock-icon svg { width:22px; height:22px; }
    .lock-icon.ok  { border-color:rgba(16,185,129,0.5); background:rgba(16,185,129,0.1); }
    .lock-icon.err { border-color:rgba(239,68,68,0.5);  background:rgba(239,68,68,0.08); }
    .dots { display:flex; justify-content:center; gap:14px; margin-bottom:32px; }
    .dot {
      width:14px; height:14px; border-radius:50%;
      border:2px solid rgba(255,255,255,0.15); background:transparent;
      transition:background .15s,border-color .15s,transform .15s;
    }
    .dot.on  { background:var(--accent); border-color:var(--accent); transform:scale(1.15); }
    .dot.ok  { background:#10b981; border-color:#10b981; }
    .dot.err { background:#ef4444; border-color:#ef4444; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .key {
      aspect-ratio:1; border-radius:16px; border:1px solid var(--border);
      background:rgba(255,255,255,0.03); font-family:'Syne',sans-serif;
      font-size:1.4rem; font-weight:700; color:var(--text);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .12s,border-color .12s,transform .08s;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .key:hover { background:rgba(79,142,247,0.1); border-color:rgba(79,142,247,0.3); }
    .key.p    { background:rgba(79,142,247,0.22); transform:scale(0.93); }
    .key.blank{ background:transparent; border-color:transparent; cursor:default; pointer-events:none; }
    .key.back svg { width:20px; height:20px; }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%{ transform:translateX(-8px); }
      40%{ transform:translateX(8px); }
      60%{ transform:translateX(-6px); }
      80%{ transform:translateX(6px); }
    }
    .shake { animation:shake .4s ease; }
    @keyframes pulse {
      0%  { box-shadow:0 0 0 0 rgba(16,185,129,0.4); }
      70% { box-shadow:0 0 0 16px rgba(16,185,129,0); }
      100%{ box-shadow:0 0 0 0 rgba(16,185,129,0); }
    }
    .pulse { animation:pulse .6s ease; }
  </style>
</head>
<body>
<div class="shell" id="shell">
  <div class="lock-icon" id="ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <div class="dots" id="dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="grid">
    <button class="key" data-n="1">1</button>
    <button class="key" data-n="2">2</button>
    <button class="key" data-n="3">3</button>
    <button class="key" data-n="4">4</button>
    <button class="key" data-n="5">5</button>
    <button class="key" data-n="6">6</button>
    <button class="key" data-n="7">7</button>
    <button class="key" data-n="8">8</button>
    <button class="key" data-n="9">9</button>
    <button class="key blank"></button>
    <button class="key" data-n="0">0</button>
    <button class="key back" id="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
        <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
      </svg>
    </button>
  </div>
</div>
<script>
  const H='b3282a2f2a28757b3a18ab833de16a9c54518c0b0cf493e3f0a7cf09386f326a';
  let inp='', busy=false;
  const ds=[0,1,2,3].map(i=>document.getElementById('d'+i));
  const shell=document.getElementById('shell');
  const ico=document.getElementById('ico');
  const icoSvg=ico.querySelector('svg');

  async function hash(s){
    const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
  }

  function sync(){ ds.forEach((d,i)=>{ d.className='dot'+(i<inp.length?' on':''); }); }

  async function check(){
    if(busy)return; busy=true;
    if(await hash(inp)===H){
      ds.forEach(d=>{d.className='dot ok';});
      ico.classList.add('ok'); icoSvg.setAttribute('stroke','#10b981');
      shell.classList.add('pulse');
      setTimeout(()=>window.location.replace('./main.html'),600);
    } else {
      ds.forEach(d=>{d.className='dot err';});
      ico.classList.add('err'); icoSvg.setAttribute('stroke','#ef4444');
      shell.classList.add('shake');
      setTimeout(()=>{
        shell.classList.remove('shake');
        ico.classList.remove('err'); icoSvg.setAttribute('stroke','#4f8ef7');
        inp=''; sync(); busy=false;
      },700);
    }
  }

  function press(n){
    if(busy||inp.length>=4)return;
    const b=document.querySelector('[data-n="'+n+'"]');
    if(b){b.classList.add('p');setTimeout(()=>b.classList.remove('p'),120);}
    inp+=n; sync();
    if(inp.length===4)setTimeout(check,120);
  }

  function del(){
    if(busy)return;
    const b=document.getElementById('back');
    b.classList.add('p');setTimeout(()=>b.classList.remove('p'),120);
    inp=inp.slice(0,-1); sync();
  }

  document.querySelectorAll('.key[data-n]').forEach(b=>b.addEventListener('click',()=>press(b.dataset.n)));
  document.getElementById('back').addEventListener('click',del);
  document.addEventListener('keydown',e=>{
    if(e.key>='0'&&e.key<='9')press(e.key);
    else if(e.key==='Backspace')del();
  });
</script>
</body>
</html>
