<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Access</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#f5f5f5;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .shell{
      background:#fff;
      border-top:3px solid #BB1919;
      border:1px solid #e0e0e0;
      border-top:3px solid #BB1919;
      padding:32px 28px 28px;
      width:min(260px,90vw);
      box-shadow:0 2px 16px rgba(0,0,0,.07);
    }
    .dots{
      display:flex;justify-content:center;gap:16px;
      margin-bottom:28px;
    }
    .dot{
      width:12px;height:12px;border-radius:50%;
      border:2px solid #e0e0e0;background:transparent;
      transition:background .15s,border-color .15s,transform .12s;
    }
    .dot.on {background:#BB1919;border-color:#BB1919;transform:scale(1.2);}
    .dot.ok {background:#1a7a3f;border-color:#1a7a3f;}
    .dot.err{background:#8B1010;border-color:#8B1010;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .key{
      aspect-ratio:1;border:1px solid #e0e0e0;background:#f5f5f5;
      font-family:system-ui,sans-serif;font-size:1.3rem;font-weight:700;color:#0d0d0d;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .1s,transform .08s;
      user-select:none;-webkit-tap-highlight-color:transparent;
      border-radius:2px;
    }
    .key:hover{background:#e0e0e0;}
    .key.p{background:#BB1919;color:#fff;border-color:#BB1919;transform:scale(.94);}
    .key.blank{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
    .key.back svg{width:17px;height:17px;}
    @keyframes shake{
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-7px);}
      40%{transform:translateX(7px);}
      60%{transform:translateX(-5px);}
      80%{transform:translateX(5px);}
    }
    .shake{animation:shake .38s ease;}
  </style>
</head>
<body>
<div class="shell" id="shell">
  <div class="dots" id="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div class="grid">
    <button class="key" data-n="1">1</button>
    <button class="key" data-n="2">2</button>
    <button class="key" data-n="3">3</button>
    <button class="key" data-n="4">4</button>
    <button class="key" data-n="5">5</button>
    <button class="key" data-n="6">6</button>
    <button class="key" data-n="7">7</button>
    <button class="key" data-n="8">8</button>
    <button class="key" data-n="9">9</button>
    <button class="key blank"></button>
    <button class="key" data-n="0">0</button>
    <button class="key back" id="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
        <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
      </svg>
    </button>
  </div>
</div>
<script>
  const H='b3282a2f2a28757b3a18ab833de16a9c54518c0b0cf493e3f0a7cf09386f326a';
  let inp='',busy=false;
  const ds=[0,1,2,3].map(i=>document.getElementById('d'+i));
  const shell=document.getElementById('shell');
  async function hash(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
  function sync(){ds.forEach((d,i)=>{d.className='dot'+(i<inp.length?' on':'');});}
  async function check(){
    if(busy)return;busy=true;
    if(await hash(inp)===H){ds.forEach(d=>{d.className='dot ok';});setTimeout(()=>{sessionStorage.setItem('msi_auth',H);window.location.replace('./main.html');},500);}
    else{ds.forEach(d=>{d.className='dot err';});shell.classList.add('shake');setTimeout(()=>{shell.classList.remove('shake');ds.forEach(d=>{d.className='dot';});inp='';sync();busy=false;},650);}
  }
  function press(n){if(busy||inp.length>=4)return;const b=document.querySelector('[data-n="'+n+'"]');if(b){b.classList.add('p');setTimeout(()=>b.classList.remove('p'),130);}inp+=n;sync();if(inp.length===4)setTimeout(check,130);}
  function del(){if(busy)return;const b=document.getElementById('back');b.classList.add('p');setTimeout(()=>b.classList.remove('p'),130);inp=inp.slice(0,-1);sync();}
  document.querySelectorAll('.key[data-n]').forEach(b=>b.addEventListener('click',()=>press(b.dataset.n)));
  document.getElementById('back').addEventListener('click',del);
  document.addEventListener('keydown',e=>{if(e.key>='0'&&e.key<='9')press(e.key);else if(e.key==='Backspace')del();});
</script>
</body>
</html>
